services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      - POSTGRES_USER=shokujinwiki_be
      - POSTGRES_PASSWORD=shokujinwiki_be
      - POSTGRES_DB=shokujinwiki_be_development
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
